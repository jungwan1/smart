<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lineage Ledger - 리니지 일일 장부</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at top, #1a0a1f 0%, #0a0508 60%, #000 100%);
    color: #e8d8b8;
    font-family: "Noto Serif KR", "Cinzel", serif;
    padding: 24px 16px;
    position: relative;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      repeating-linear-gradient(45deg, transparent, transparent 100px, rgba(180,140,80,0.02) 100px, rgba(180,140,80,0.02) 101px),
      repeating-linear-gradient(-45deg, transparent, transparent 100px, rgba(180,140,80,0.02) 100px, rgba(180,140,80,0.02) 101px);
    pointer-events: none;
    z-index: 0;
  }
  .container { max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }
  
  .cloud-status {
    display: flex; justify-content: flex-end; margin-bottom: 20px;
  }
  .cloud-badge {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 14px;
    background: rgba(20,30,50,0.4);
    border: 1px solid #4a6a8a;
    font-size: 12px;
    color: #7fa9d4;
  }
  
  header {
    text-align: center;
    margin-bottom: 36px;
    padding: 24px 0;
    border-top: 2px solid #8b6914;
    border-bottom: 2px solid #8b6914;
    position: relative;
  }
  .crown-icon {
    position: absolute;
    top: -12px; left: 50%;
    transform: translateX(-50%);
    background: #0a0508;
    padding: 0 16px;
    color: #d4af37;
    font-size: 24px;
  }
  h1 {
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 700;
    color: #d4af37;
    letter-spacing: 0.15em;
    text-shadow: 0 0 20px rgba(212,175,55,0.3);
  }
  header p {
    font-size: 13px;
    color: #8b7355;
    letter-spacing: 0.3em;
    margin-top: 8px;
    text-transform: uppercase;
  }
  
  .date-bar {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; margin-bottom: 24px; flex-wrap: wrap;
  }
  .date-bar input[type="date"] {
    background: rgba(20,10,15,0.8);
    border: 1px solid #8b6914;
    color: #e8d8b8;
    padding: 8px 14px;
    font-size: 15px;
    font-family: inherit;
    color-scheme: dark;
  }
  .btn-today {
    background: transparent;
    border: 1px solid #8b6914;
    color: #d4af37;
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 0.1em;
    font-family: inherit;
  }
  
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px;
    margin-bottom: 32px;
  }
  .summary-card {
    border: 1px solid rgba(139,105,20,0.5);
    background: rgba(20,10,15,0.6);
    padding: 16px 18px;
  }
  .summary-card.highlight {
    box-shadow: 0 0 20px rgba(212,175,55,0.3);
  }
  .summary-card .label {
    font-size: 12px; letter-spacing: 0.15em;
    text-transform: uppercase; margin-bottom: 8px;
  }
  .summary-card .value {
    font-size: 20px; font-weight: 700;
  }
  
  .input-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px; margin-bottom: 24px;
  }
  .input-panel {
    background: rgba(20,10,15,0.6);
    padding: 18px;
  }
  .input-panel.income { border: 1px solid rgba(95,196,106,0.3); }
  .input-panel.expense { border: 1px solid rgba(212,80,74,0.3); }
  .input-panel h3 {
    font-size: 14px; letter-spacing: 0.15em;
    margin-bottom: 14px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .input-panel.income h3 { color: #5fc46a; }
  .input-panel.expense h3 { color: #d4504a; }
  
  .preset-btn {
    background: transparent;
    padding: 4px 10px;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.1em;
  }
  .input-panel.income .preset-btn { border: 1px solid rgba(95,196,106,0.5); color: #5fc46a; }
  .input-panel.expense .preset-btn { border: 1px solid rgba(212,80,74,0.5); color: #d4504a; }
  
  .input-fields { display: flex; flex-direction: column; gap: 8px; }
  .input-fields .row { display: flex; gap: 8px; }
  .input-fields input {
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(139,105,20,0.5);
    color: #e8d8b8;
    padding: 9px 12px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    width: 100%;
  }
  .input-fields .row input.qty { flex: 1; }
  .input-fields .row input.price { flex: 2; }
  .calc-preview {
    font-size: 12px; color: #8b7355; text-align: right;
    min-height: 16px;
  }
  .add-btn {
    padding: 10px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.15em;
    font-size: 13px;
    font-weight: 600;
  }
  .input-panel.income .add-btn {
    background: rgba(95,196,106,0.15);
    border: 1px solid #5fc46a;
    color: #5fc46a;
  }
  .input-panel.expense .add-btn {
    background: rgba(212,80,74,0.15);
    border: 1px solid #d4504a;
    color: #d4504a;
  }
  
  .exp-bar {
    background: rgba(20,30,50,0.4);
    border: 1px solid #4a6a8a;
    padding: 16px 20px;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .exp-bar label {
    color: #7fa9d4;
    font-size: 14px;
    letter-spacing: 0.1em;
    font-weight: 600;
  }
  .exp-bar input {
    flex: 1; min-width: 150px;
    background: rgba(0,0,0,0.5);
    border: 1px solid #4a6a8a;
    color: #e8d8b8;
    padding: 8px 12px;
    font-size: 15px;
    font-family: inherit;
  }
  
  .list-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
    margin-bottom: 32px;
  }
  .item-list {
    border: 1px solid rgba(139,105,20,0.4);
    background: rgba(20,10,15,0.4);
    padding: 18px;
    min-height: 180px;
  }
  .item-list h4 {
    margin-bottom: 12px;
    font-size: 13px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .item-list.income h4 { color: #5fc46a; }
  .item-list.expense h4 { color: #d4504a; }
  
  .empty-msg {
    color: #5a4a3a;
    font-size: 13px;
    text-align: center;
    padding: 32px 0;
  }
  .item-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: rgba(0,0,0,0.3);
    margin-bottom: 6px;
  }
  .item-list.income .item-row { border-left: 2px solid #5fc46a; }
  .item-list.expense .item-row { border-left: 2px solid #d4504a; }
  .item-info { flex: 1; min-width: 0; }
  .item-info .name {
    color: #e8d8b8; font-size: 14px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .item-info .meta { font-size: 11px; color: #8b7355; }
  .item-total {
    font-size: 13px; font-weight: 600; white-space: nowrap;
  }
  .item-list.income .item-total { color: #5fc46a; }
  .item-list.expense .item-total { color: #d4504a; }
  .delete-btn {
    background: transparent;
    border: none;
    color: #a04040;
    cursor: pointer;
    padding: 4px;
    font-size: 14px;
  }
  
  .recent-table {
    border: 1px solid #8b6914;
    background: rgba(20,10,15,0.6);
    padding: 20px;
    margin-bottom: 24px;
  }
  .recent-table h3 {
    color: #d4af37;
    font-size: 16px;
    letter-spacing: 0.2em;
    margin-bottom: 16px;
  }
  .recent-table table {
    width: 100%; border-collapse: collapse; font-size: 14px;
  }
  .recent-table th {
    text-align: left; padding: 8px; color: #8b7355;
    border-bottom: 1px solid #8b6914;
  }
  .recent-table th.right { text-align: right; }
  .recent-table td {
    padding: 8px;
    border-bottom: 1px dashed rgba(139,105,20,0.3);
    cursor: pointer;
  }
  .recent-table td.right { text-align: right; }
  .recent-table tr.total-row td {
    border-top: 2px solid #8b6914;
    border-bottom: none;
    padding: 10px 8px;
    font-weight: 700;
  }
  
  footer {
    text-align: center;
    padding: 20px 0;
    border-top: 1px solid rgba(139,105,20,0.4);
    color: #5a4a3a;
    font-size: 11px;
    letter-spacing: 0.2em;
  }
  
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 16px;
  }
  .modal.active { display: flex; }
  .modal-content {
    background: #1a0a1f;
    border: 2px solid #8b6914;
    padding: 24px;
    max-width: 500px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px;
  }
  .modal-header h3 {
    color: #d4af37; letter-spacing: 0.2em;
  }
  .close-btn {
    background: transparent; border: none;
    color: #8b7355; cursor: pointer; font-size: 24px;
  }
  .preset-item {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px;
    background: rgba(139,105,20,0.1);
    border: 1px solid rgba(139,105,20,0.4);
    margin-bottom: 8px;
  }
  .preset-item button.use {
    flex: 1; text-align: left;
    background: transparent; border: none;
    color: #e8d8b8; cursor: pointer;
    font-family: inherit; font-size: 14px;
  }
  .preset-item button.use .name { color: #d4af37; }
  .preset-item button.use .price-text {
    font-size: 12px; color: #8b7355;
  }
  .add-preset-btn {
    width: 100%;
    background: transparent;
    border: 1px dashed #8b6914;
    color: #d4af37;
    padding: 10px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.1em;
  }
  
  .loading-screen {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at top, #1a0a1f 0%, #0a0508 60%, #000 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  }
  .spinner {
    width: 60px;
    height: 60px;
    border: 3px solid rgba(212,175,55,0.2);
    border-top-color: #d4af37;
    border-radius: 50%;
    margin: 0 auto 24px;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { text-align: center; }
  .loading-text h2 {
    color: #d4af37; letter-spacing: 0.2em;
  }
  .loading-text p {
    color: #8b7355; font-size: 13px; margin-top: 12px;
  }
</style>
</head>
<body>

<!-- 로딩 화면 -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-text">
    <div class="spinner"></div>
    <h2>연결 중...</h2>
    <p id="loadingMsg">Firebase에 연결하고 있습니다</p>
  </div>
</div>

<!-- 메인 -->
<div class="container" id="mainContent" style="display:none">
  <div class="cloud-status">
    <div class="cloud-badge">
      <span>☁</span>
      <span id="syncStatus">클라우드 동기화</span>
    </div>
  </div>

  <header>
    <div class="crown-icon">♛</div>
    <h1>LINEAGE LEDGER</h1>
    <p>⚔ 모험가의 일일 장부 ⚔</p>
  </header>

  <div class="date-bar">
    <span style="color:#d4af37; font-size: 18px;">📅</span>
    <input type="date" id="dateInput">
    <button class="btn-today" id="todayBtn">오늘</button>
  </div>

  <div class="summary-grid">
    <div class="summary-card">
      <div class="label" style="color:#5fc46a;">📈 총 수입</div>
      <div class="value" id="totalIncome" style="color:#e8d8b8;">0 아데나</div>
    </div>
    <div class="summary-card">
      <div class="label" style="color:#d4504a;">📉 총 지출</div>
      <div class="value" id="totalExpense" style="color:#e8d8b8;">0 아데나</div>
    </div>
    <div class="summary-card highlight" id="netCard">
      <div class="label" style="color:#d4af37;">💰 순이익</div>
      <div class="value" id="netProfit" style="color:#d4af37;">0 아데나</div>
    </div>
    <div class="summary-card">
      <div class="label" style="color:#7fa9d4;">⚔ 획득 경험치</div>
      <div class="value" id="totalExp" style="color:#e8d8b8;">0 EXP</div>
    </div>
  </div>

  <div class="input-grid">
    <div class="input-panel income">
      <h3>
        <span>📈 수입 (드랍 아이템)</span>
        <button class="preset-btn" data-target="income">📜 프리셋</button>
      </h3>
      <div class="input-fields">
        <input type="text" id="incomeName" placeholder="아이템 이름">
        <div class="row">
          <input type="number" class="qty" id="incomeQty" placeholder="수량" value="1" min="1">
          <input type="number" class="price" id="incomePrice" placeholder="개당 가격(아데나)" min="0">
        </div>
        <div class="calc-preview" id="incomePreview"></div>
        <button class="add-btn" id="addIncomeBtn">+ 추가</button>
      </div>
    </div>

    <div class="input-panel expense">
      <h3>
        <span>📉 지출 (소모 아이템)</span>
        <button class="preset-btn" data-target="expense">📜 프리셋</button>
      </h3>
      <div class="input-fields">
        <input type="text" id="expenseName" placeholder="아이템 이름">
        <div class="row">
          <input type="number" class="qty" id="expenseQty" placeholder="수량" value="1" min="1">
          <input type="number" class="price" id="expensePrice" placeholder="개당 가격(아데나)" min="0">
        </div>
        <div class="calc-preview" id="expensePreview"></div>
        <button class="add-btn" id="addExpenseBtn">+ 추가</button>
      </div>
    </div>
  </div>

  <div class="exp-bar">
    <span style="color:#7fa9d4;">⚔</span>
    <label>오늘 획득 경험치</label>
    <input type="number" id="expInput" placeholder="0">
    <span style="color:#8b7355; font-size:13px;">EXP</span>
  </div>

  <div class="list-grid">
    <div class="item-list income">
      <h4>수입 내역 <span id="incomeCount">(0)</span></h4>
      <div id="incomeList">
        <div class="empty-msg">기록된 항목이 없습니다</div>
      </div>
    </div>
    <div class="item-list expense">
      <h4>지출 내역 <span id="expenseCount">(0)</span></h4>
      <div id="expenseList">
        <div class="empty-msg">기록된 항목이 없습니다</div>
      </div>
    </div>
  </div>

  <div class="recent-table" id="recentTable" style="display:none">
    <h3>📜 최근 기록 (최대 7일)</h3>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th>날짜</th>
            <th class="right">순이익</th>
            <th class="right">경험치</th>
          </tr>
        </thead>
        <tbody id="recentBody"></tbody>
      </table>
    </div>
  </div>

  <footer>
    ⚔ Firebase Cloud ⚔ <span id="userIdDisplay">N/A</span>
  </footer>
</div>

<!-- 프리셋 모달 -->
<div class="modal" id="presetModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>아이템 프리셋</h3>
      <button class="close-btn" id="closeModalBtn">×</button>
    </div>
    <div id="presetList"></div>
    <button class="add-preset-btn" id="addPresetBtn">+ 새 프리셋 추가</button>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ============================================
  // Firebase 설정
  // ============================================
  const firebaseConfig = {
    apiKey: "AIzaSyCMNeIGYFZeIff_kValSZxAl_fj7pVlMw4",
    authDomain: "lineage-d6121.firebaseapp.com",
    databaseURL: "https://lineage-d6121-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "lineage-d6121",
    storageBucket: "lineage-d6121.firebasestorage.app",
    messagingSenderId: "982221659029",
    appId: "1:982221659029:web:c22d23fd7397394af3749c"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // ============================================
  // 상태
  // ============================================
  let userId = null;
  let allRecords = {};
  let presets = [
    { name: '아데나', price: 1 },
    { name: '집중 룬', price: 50000 },
    { name: '축복받은 보스의 인장', price: 250000 },
    { name: '용기의 물약', price: 8000 },
    { name: '순간이동 주문서', price: 15000 },
    { name: '기란 대형 회복약', price: 35000 },
  ];
  let selectedDate = new Date().toISOString().split('T')[0];
  let activePresetTarget = null;
  let dataLoaded = false;
  let saveTimer = null;

  // ============================================
  // 로그인
  // ============================================
  signInAnonymously(auth).catch(err => {
    document.getElementById('loadingMsg').textContent = '오류: ' + err.message;
  });

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      userId = user.uid;
      document.getElementById('userIdDisplay').textContent = 'User: ' + userId.slice(0, 8) + '...';
      await loadData();
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
    }
  });

  async function loadData() {
    try {
      const userDocRef = doc(db, 'users', userId);
      const docSnap = await getDoc(userDocRef);
      if (docSnap.exists()) {
        const data = docSnap.data();
        allRecords = data.records || {};
        if (data.presets && data.presets.length > 0) presets = data.presets;
      }
      dataLoaded = true;
      render();
    } catch (err) {
      console.error('데이터 로드 오류:', err);
      dataLoaded = true;
    }
  }

  function saveData() {
    if (!dataLoaded || !userId) return;
    clearTimeout(saveTimer);
    saveTimer = setTimeout(async () => {
      const status = document.getElementById('syncStatus');
      status.textContent = '저장 중...';
      try {
        const userDocRef = doc(db, 'users', userId);
        await setDoc(userDocRef, {
          records: allRecords,
          presets: presets,
          updatedAt: new Date().toISOString()
        }, { merge: true });
        status.textContent = '✓ 저장됨';
        setTimeout(() => { status.textContent = '클라우드 동기화'; }, 2000);
      } catch (err) {
        status.textContent = '⚠ 저장 실패';
        console.error(err);
      }
    }, 800);
  }

  // ============================================
  // 렌더링
  // ============================================
  const fmt = (n) => n.toLocaleString('ko-KR');
  
  function getTodayRecord() {
    if (!allRecords[selectedDate]) {
      allRecords[selectedDate] = { income: [], expense: [], exp: 0 };
    }
    return allRecords[selectedDate];
  }

  function render() {
    const r = getTodayRecord();
    const totalIncome = r.income.reduce((s, i) => s + i.total, 0);
    const totalExpense = r.expense.reduce((s, i) => s + i.total, 0);
    const net = totalIncome - totalExpense;
    
    document.getElementById('totalIncome').textContent = fmt(totalIncome) + ' 아데나';
    document.getElementById('totalExpense').textContent = fmt(totalExpense) + ' 아데나';
    document.getElementById('netProfit').textContent = (net >= 0 ? '+' : '') + fmt(net) + ' 아데나';
    document.getElementById('netProfit').style.color = net >= 0 ? '#d4af37' : '#a04040';
    document.getElementById('totalExp').textContent = fmt(r.exp || 0) + ' EXP';
    document.getElementById('expInput').value = r.exp || '';
    
    renderItemList('income', r.income);
    renderItemList('expense', r.expense);
    renderRecentTable();
  }

  function renderItemList(type, items) {
    const list = document.getElementById(type + 'List');
    document.getElementById(type + 'Count').textContent = '(' + items.length + ')';
    
    if (items.length === 0) {
      list.innerHTML = '<div class="empty-msg">기록된 항목이 없습니다</div>';
      return;
    }
    
    list.innerHTML = items.map(item => `
      <div class="item-row">
        <div class="item-info">
          <div class="name">${escapeHtml(item.name)}</div>
          <div class="meta">${fmt(item.price)} × ${item.quantity}</div>
        </div>
        <div class="item-total">${fmt(item.total)}</div>
        <button class="delete-btn" data-type="${type}" data-id="${item.id}">🗑</button>
      </div>
    `).join('');
    
    list.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const t = e.target.dataset.type;
        const id = Number(e.target.dataset.id);
        const rec = getTodayRecord();
        rec[t] = rec[t].filter(it => it.id !== id);
        saveData();
        render();
      });
    });
  }

  function renderRecentTable() {
    const dates = Object.keys(allRecords).sort().slice(-7);
    if (dates.length === 0) {
      document.getElementById('recentTable').style.display = 'none';
      return;
    }
    document.getElementById('recentTable').style.display = 'block';
    
    let totalNet = 0, totalExp = 0;
    let html = '';
    
    dates.forEach(date => {
      const r = allRecords[date];
      const income = (r.income || []).reduce((s, i) => s + i.total, 0);
      const expense = (r.expense || []).reduce((s, i) => s + i.total, 0);
      const net = income - expense;
      const exp = r.exp || 0;
      totalNet += net;
      totalExp += exp;
      
      const isSelected = date === selectedDate;
      html += `
        <tr data-date="${date}">
          <td style="color:${isSelected ? '#d4af37' : '#e8d8b8'};">${date}${isSelected ? ' ◀' : ''}</td>
          <td class="right" style="color:${net >= 0 ? '#5fc46a' : '#d4504a'};">${net >= 0 ? '+' : ''}${fmt(net)}</td>
          <td class="right" style="color:#7fa9d4;">${fmt(exp)}</td>
        </tr>
      `;
    });
    
    html += `
      <tr class="total-row">
        <td style="color:#d4af37;">합계</td>
        <td class="right" style="color:${totalNet >= 0 ? '#5fc46a' : '#d4504a'};">${totalNet >= 0 ? '+' : ''}${fmt(totalNet)}</td>
        <td class="right" style="color:#7fa9d4;">${fmt(totalExp)}</td>
      </tr>
    `;
    
    document.getElementById('recentBody').innerHTML = html;
    
    document.querySelectorAll('#recentBody tr[data-date]').forEach(tr => {
      tr.addEventListener('click', () => {
        selectedDate = tr.dataset.date;
        document.getElementById('dateInput').value = selectedDate;
        render();
      });
    });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ============================================
  // 이벤트
  // ============================================
  document.getElementById('dateInput').value = selectedDate;
  document.getElementById('dateInput').addEventListener('change', (e) => {
    selectedDate = e.target.value;
    render();
  });
  document.getElementById('todayBtn').addEventListener('click', () => {
    selectedDate = new Date().toISOString().split('T')[0];
    document.getElementById('dateInput').value = selectedDate;
    render();
  });

  function setupAddItem(type) {
    const nameEl = document.getElementById(type + 'Name');
    const qtyEl = document.getElementById(type + 'Qty');
    const priceEl = document.getElementById(type + 'Price');
    const previewEl = document.getElementById(type + 'Preview');
    const btnEl = document.getElementById('add' + type.charAt(0).toUpperCase() + type.slice(1) + 'Btn');
    
    function updatePreview() {
      const q = Number(qtyEl.value);
      const p = Number(priceEl.value);
      previewEl.textContent = (q > 0 && p > 0) ? '합계: ' + fmt(q * p) + ' 아데나' : '';
    }
    qtyEl.addEventListener('input', updatePreview);
    priceEl.addEventListener('input', updatePreview);
    
    function add() {
      const name = nameEl.value.trim();
      const quantity = Number(qtyEl.value);
      const price = Number(priceEl.value);
      if (!name || price <= 0 || quantity <= 0) return;
      
      const r = getTodayRecord();
      r[type].push({
        id: Date.now(),
        name, quantity, price,
        total: quantity * price
      });
      
      nameEl.value = '';
      qtyEl.value = '1';
      priceEl.value = '';
      previewEl.textContent = '';
      
      saveData();
      render();
    }
    
    btnEl.addEventListener('click', add);
    [nameEl, qtyEl, priceEl].forEach(el => {
      el.addEventListener('keydown', (e) => { if (e.key === 'Enter') add(); });
    });
  }
  setupAddItem('income');
  setupAddItem('expense');

  document.getElementById('expInput').addEventListener('input', (e) => {
    getTodayRecord().exp = Number(e.target.value) || 0;
    document.getElementById('totalExp').textContent = fmt(Number(e.target.value) || 0) + ' EXP';
    saveData();
  });

  // 프리셋 모달
  function openPresetModal(target) {
    activePresetTarget = target;
    renderPresets();
    document.getElementById('presetModal').classList.add('active');
  }
  function closePresetModal() {
    document.getElementById('presetModal').classList.remove('active');
  }
  function renderPresets() {
    const list = document.getElementById('presetList');
    list.innerHTML = presets.map((p, idx) => `
      <div class="preset-item">
        <button class="use" data-idx="${idx}">
          <div class="name">${escapeHtml(p.name)}</div>
          <div class="price-text">${fmt(p.price)} 아데나</div>
        </button>
        <button class="delete-btn" data-del="${idx}">🗑</button>
      </div>
    `).join('');
    
    list.querySelectorAll('button.use').forEach(btn => {
      btn.addEventListener('click', () => {
        const p = presets[Number(btn.dataset.idx)];
        document.getElementById(activePresetTarget + 'Name').value = p.name;
        document.getElementById(activePresetTarget + 'Price').value = p.price;
        document.getElementById(activePresetTarget + 'Preview').textContent = '';
        closePresetModal();
      });
    });
    list.querySelectorAll('[data-del]').forEach(btn => {
      btn.addEventListener('click', () => {
        presets.splice(Number(btn.dataset.del), 1);
        saveData();
        renderPresets();
      });
    });
  }

  document.querySelectorAll('.preset-btn[data-target]').forEach(btn => {
    btn.addEventListener('click', () => openPresetModal(btn.dataset.target));
  });
  document.getElementById('closeModalBtn').addEventListener('click', closePresetModal);
  document.getElementById('presetModal').addEventListener('click', (e) => {
    if (e.target.id === 'presetModal') closePresetModal();
  });

  document.getElementById('addPresetBtn').addEventListener('click', () => {
    const name = prompt('아이템 이름:');
    if (!name) return;
    const priceStr = prompt('아이템 가격(아데나):');
    const price = Number(priceStr);
    if (!price || price < 0) return;
    presets.push({ name, price });
    saveData();
    renderPresets();
  });
</script>
</body>
</html>
